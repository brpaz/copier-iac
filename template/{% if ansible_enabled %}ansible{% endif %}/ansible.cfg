[defaults]
host_key_checking = True
retry_files_enabled = False
roles_path = roles:roles_galaxy

# Deliberately no vault_password_file here: Ansible validates it eagerly
# (errors on every run, even ones touching no vault content) if the file
# is missing or empty. Passed explicitly via --vault-password-file only
# by the commands that actually need it (see Taskfile.yml), once .vault-pass
# exists.

[ssh_connection]
ssh_args = -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=~/.ssh/known_hosts
