# https://taskfile.dev
#
# Environment-scoped tasks take ENV as a CLI variable, e.g.:
#   task ansible:playbook ENV=staging

version: "3"

tasks:
  galaxy-install:
    desc: "Install Ansible Galaxy roles/collections"
    cmds:
      - ansible-galaxy role install -r requirements.yml -p roles_galaxy
      - ansible-galaxy collection install -r requirements.yml

  lint:
    desc: "Lint Ansible playbook and roles"
    cmds:
      - ansible-lint playbook.yml

  syntax-check:
    desc: "Check playbook syntax"
    cmds:
      - ansible-playbook --syntax-check playbook.yml

  playbook:
    desc: "Run the playbook against an environment's inventory (usage: task ansible:playbook ENV=staging)"
    cmds:
      - |
        if [ -f .vault-pass ]; then
          ansible-playbook -i inventory/{{.ENV}}/hosts.ini --vault-password-file .vault-pass playbook.yml
        else
          ansible-playbook -i inventory/{{.ENV}}/hosts.ini playbook.yml
        fi

  # The vault-* tasks below require .vault-pass to already exist - see
  # ansible/README.md#vault. That's expected: they're only ever run once
  # you've deliberately adopted vault.
  vault-create:
    desc: "Create this environment's encrypted vault file (usage: task ansible:vault-create ENV=staging)"
    cmds:
      - ansible-vault create --vault-password-file .vault-pass inventory/{{.ENV}}/group_vars/all/vault.yml

  vault-edit:
    desc: "Edit this environment's encrypted vault file (usage: task ansible:vault-edit ENV=staging)"
    cmds:
      - ansible-vault edit --vault-password-file .vault-pass inventory/{{.ENV}}/group_vars/all/vault.yml

  vault-view:
    desc: "View this environment's encrypted vault file (usage: task ansible:vault-view ENV=staging)"
    cmds:
      - ansible-vault view --vault-password-file .vault-pass inventory/{{.ENV}}/group_vars/all/vault.yml

  vault-encrypt:
    desc: "Encrypt this environment's vault file (usage: task ansible:vault-encrypt ENV=staging)"
    cmds:
      - ansible-vault encrypt --vault-password-file .vault-pass inventory/{{.ENV}}/group_vars/all/vault.yml

  vault-decrypt:
    desc: "Decrypt this environment's vault file (usage: task ansible:vault-decrypt ENV=staging)"
    cmds:
      - ansible-vault decrypt --vault-password-file .vault-pass inventory/{{.ENV}}/group_vars/all/vault.yml
