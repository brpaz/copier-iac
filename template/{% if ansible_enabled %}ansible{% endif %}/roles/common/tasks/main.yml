---
- name: Check if swapfile exists
  ansible.builtin.stat:
    path: "{{ common_swap_path }}"
  register: common_swap_file

- name: Create swapfile
  ansible.builtin.command: fallocate -l {{ common_swap_size_mb }}M {{ common_swap_path }}
  when: not common_swap_file.stat.exists
  changed_when: true

- name: Set swapfile permissions
  ansible.builtin.file:
    path: "{{ common_swap_path }}"
    mode: "0600"

- name: Format swapfile
  ansible.builtin.command: mkswap {{ common_swap_path }}
  when: not common_swap_file.stat.exists
  changed_when: true

- name: Enable swapfile
  ansible.builtin.command: swapon {{ common_swap_path }}
  when: not common_swap_file.stat.exists
  changed_when: true

- name: Persist swapfile in fstab
  ansible.posix.mount:
    path: none
    src: "{{ common_swap_path }}"
    fstype: swap
    opts: sw
    state: present
