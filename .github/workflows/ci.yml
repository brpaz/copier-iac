name: CI
on:
  workflow_dispatch:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.13"
jobs:
  test:
    name: Test (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: terraform-cloud-init
            use_terraform: "true"
            use_ansible: "false"
            terraform_provisioner: "cloud-init"
            expect_present: "terraform/modules/infra/main.tf terraform/environments/staging/main.tf terraform/environments/production/main.tf"
            expect_absent: "ansible"
          - name: terraform-ansible-provisioner
            use_terraform: "true"
            use_ansible: "false"
            terraform_provisioner: "ansible"
            expect_present: "terraform/modules/infra/main.tf ansible/playbook.yml ansible/inventory/staging/hosts.ini ansible/inventory/production/hosts.ini"
            expect_absent: ""
          - name: ansible-only
            use_terraform: "false"
            use_ansible: "true"
            terraform_provisioner: "cloud-init"
            expect_present: "ansible/playbook.yml ansible/inventory/staging/group_vars/all/vars.yml"
            expect_absent: "terraform"
          - name: terraform-and-ansible
            use_terraform: "true"
            use_ansible: "true"
            terraform_provisioner: "cloud-init"
            expect_present: "terraform/modules/infra/main.tf ansible/playbook.yml"
            expect_absent: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install copier
        run: uv tool install copier

      - name: Run generator
        id: generator
        run: |
          tmpdir=$(mktemp -d)
          copier copy -r HEAD --force --trust --skip-tasks \
            -d project_name="Test Project" \
            -d project_description="Some project" \
            -d github_repository="brpaz/test-project" \
            -d use_terraform=${{ matrix.use_terraform }} \
            -d use_ansible=${{ matrix.use_ansible }} \
            -d terraform_provisioner=${{ matrix.terraform_provisioner }} \
            -d tfc_organization="test-org" \
            . "$tmpdir"
          echo "output_dir=$tmpdir/test-project" >> $GITHUB_OUTPUT

      - name: Check generated files
        run: |
          OUTPUT_DIR="${{ steps.generator.outputs.output_dir }}"
          echo "Checking files in: $OUTPUT_DIR"

          FAILED=0

          for file in ${{ matrix.expect_present }}; do
            if [ ! -e "$OUTPUT_DIR/$file" ]; then
              echo "❌ Expected present but missing: $file"
              FAILED=1
            fi
          done

          for path in ${{ matrix.expect_absent }}; do
            if [ -e "$OUTPUT_DIR/$path" ]; then
              echo "❌ Expected absent but found: $path"
              FAILED=1
            fi
          done

          if [ "$FAILED" -eq 0 ]; then
            echo "✅ All checks passed!"
          else
            exit 1
          fi
